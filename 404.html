<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found | Liuchao Jin</title>
  <meta name="robots" content="noindex,follow">
  <meta name="description" content="The requested page could not be found on Liuchao Jin's website.">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/favicon-32x32.png">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .not-found { align-items: center; background: radial-gradient(circle at 80% 20%, rgba(109,91,208,.18), transparent 25rem), var(--surface-soft); display: flex; min-height: 100svh; padding-block: 2rem; }
    .not-found .shell { max-width: 58rem; }
    .not-found__code { color: var(--primary); font: 800 clamp(5rem, 20vw, 12rem)/.8 Georgia, serif; letter-spacing: -.08em; margin-bottom: 1.5rem; }
    .not-found h1 { font-size: clamp(2rem, 6vw, 3.5rem); }
    .not-found .button-row { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <main class="not-found" id="main-content">
    <div class="shell">
      <p class="not-found__code" aria-hidden="true">404</p>
      <p class="eyebrow">Page not found</p>
      <h1>This path does not lead to a page.</h1>
      <p class="lede">The address may have changed, or the link may be incomplete. Start again from the homepage or browse the research.</p>
      <div class="button-row">
        <a class="button button--primary" href="index.html">Return home</a>
        <a class="button button--ghost" href="research.html">Explore research</a>
      </div>
    </div>
  </main>
</body>
</html>
